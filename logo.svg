<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" role="img" aria-label="Salman Color Logo">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F7C84B"/>
      <stop offset="30%"  stop-color="#F5A623"/>
      <stop offset="60%"  stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C47A10"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD466"/>
      <stop offset="50%"  stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C47A10"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#C47A10" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ═══ HOUSE ICON ═══ -->

  <!-- Crane left: vertical pole -->
  <line x1="88" y1="22" x2="88" y2="108" stroke="url(#g1)" stroke-width="7" stroke-linecap="round"/>
  <!-- Crane: diagonal arm -->
  <line x1="88" y1="22" x2="120" y2="56" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Crane: cross ticks -->
  <line x1="82" y1="42" x2="94" y2="42" stroke="url(#g1)" stroke-width="2.5"/>
  <line x1="82" y1="60" x2="94" y2="60" stroke="url(#g1)" stroke-width="2.5"/>
  <line x1="82" y1="78" x2="94" y2="78" stroke="url(#g1)" stroke-width="2.5"/>

  <!-- House: roof triangle -->
  <polyline points="100,108 160,38 220,108"
            fill="none" stroke="url(#g1)"
            stroke-width="8" stroke-linejoin="miter" stroke-linecap="square"
            filter="url(#shadow)"/>
  <!-- House: left wall -->
  <line x1="100" y1="108" x2="100" y2="148" stroke="url(#g1)" stroke-width="7"/>
  <!-- House: right wall -->
  <line x1="220" y1="108" x2="220" y2="148" stroke="url(#g1)" stroke-width="7"/>
  <!-- House: floor -->
  <line x1="100" y1="148" x2="220" y2="148" stroke="url(#g1)" stroke-width="7"/>
  <!-- House: window 2×2 -->
  <rect x="145" y="110" width="30" height="28" fill="none" stroke="url(#g1)" stroke-width="4"/>
  <line x1="160" y1="110" x2="160" y2="138" stroke="url(#g1)" stroke-width="2.5"/>
  <line x1="145" y1="124" x2="175" y2="124" stroke="url(#g1)" stroke-width="2.5"/>

  <!-- Hammer right: head block -->
  <rect x="203" y="20" width="34" height="20" rx="5" fill="url(#g2)" filter="url(#shadow)"/>
  <!-- Hammer: handle -->
  <line x1="214" y1="40" x2="188" y2="84" stroke="url(#g1)" stroke-width="7" stroke-linecap="round"/>

  <!-- ═══ TEXT ═══ -->

  <!-- SALMAN -->
  <text x="160" y="200"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="bold"
        fill="url(#g2)"
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#shadow)">SALMAN</text>

  <!-- decorative line dots -->
  <circle cx="80"  cy="220" r="3" fill="#F5A623" opacity=".7"/>
  <circle cx="240" cy="220" r="3" fill="#F5A623" opacity=".7"/>

  <!-- COLOR -->
  <text x="160" y="248"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-weight="bold"
        fill="url(#g2)"
        text-anchor="middle"
        letter-spacing="14"
        filter="url(#shadow)">COLOR</text>
</svg>
